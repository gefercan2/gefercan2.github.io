<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radial Artifact Chart</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f9f9f9;
  }

  svg {
    display: block;
    margin: auto;
  }

  .tooltip {
    position: absolute;
    background: white;
    padding: 8px;
    border: 1px solid #ccc;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
  }
</style>
</head>

<body>

<svg width="1000" height="1000"></svg>

<script>

const width = 700;
const height = 700;
const innerRadius = 80;
const outerRadius = 300;

const svg = d3.select("svg");
const g = svg.append("g")
  .attr("transform", `translate(${width/2},${height/2})`);

// Tooltip
const tooltip = d3.select("body")
  .append("div")
  .attr("class", "tooltip");

// Load CSV
d3.csv("./Timeline - LOUVRE_AbuDhabi.csv ", d => {
  const date = +d["chart standarized date"];
  if (isNaN(date)) return null;

  return {
    code: d["inventory code"],
    title: d["Title"],
    maker: d["Maker"],
    dateLabel: d["date"],
    estimate: d["chart estimate type"],
    year: date,
    place: d["Production Place"],
    country: d["Country (current)"],
    continent: d["Continent"],
    period: d["historic period/ polity"],
    age: d["historical age"] || "unknown",
    category: d["category"],
    link: d["link"]
  };
}).then(data => {

  data = data.filter(d => d !== null);

  // ---- Scales ----
  const angle = d3.scaleLinear()
    .domain(d3.extent(data, d => d.year))
    .range([0, 2 * Math.PI]);

  const ages = Array.from(new Set(data.map(d => d.age)));

  const radius = d3.scaleBand()
    .domain(ages)
    .range([innerRadius, outerRadius])
    .padding(0.2);

  // ---- Angle axis (years) ----
  const ticks = angle.ticks(12);

  g.selectAll(".angle-line")
    .data(ticks)
    .enter()
    .append("line")
    .attr("x1", d => Math.cos(angle(d) - Math.PI/2) * innerRadius)
    .attr("y1", d => Math.sin(angle(d) - Math.PI/2) * innerRadius)
    .attr("x2", d => Math.cos(angle(d) - Math.PI/2) * outerRadius)
    .attr("y2", d => Math.sin(angle(d) - Math.PI/2) * outerRadius)
    .attr("stroke", "#ddd");

  // Year labels
  g.selectAll(".angle-label")
    .data(ticks)
    .enter()
    .append("text")
    .attr("x", d => Math.cos(angle(d) - Math.PI/2) * (outerRadius + 15))
    .attr("y", d => Math.sin(angle(d) - Math.PI/2) * (outerRadius + 15))
    .attr("text-anchor", "middle")
    .attr("font-size", "10px")
    .text(d => d);

  // ---- Radial bands (historical age) ----
  g.selectAll(".age-ring")
    .data(ages)
    .enter()
    .append("circle")
    .attr("r", d => radius(d))
    .attr("fill", "none")
    .attr("stroke", "#aaa")
    .attr("stroke-dasharray", "2,2");

  // Age labels
  g.selectAll(".age-label")
    .data(ages)
    .enter()
    .append("text")
    .attr("y", d => -radius(d))
    .attr("dy", "-2px")
    .attr("text-anchor", "middle")
    .attr("font-size", "11px")
    .text(d => d);

  // ---- Blur filter ----
  const defs = svg.append("defs");

  const blur = defs.append("filter")
    .attr("id", "blur");

  blur.append("feGaussianBlur")
    .attr("stdDeviation", 2);

  // ---- Dots ----
  g.selectAll(".dot")
    .data(data)
    .enter()
    .append("circle")
    .attr("class", "dot")
    .attr("cx", d => {
      const a = angle(d.year) - Math.PI/2;
      const r = radius(d.age);
      return Math.cos(a) * r;
    })
    .attr("cy", d => {
      const a = angle(d.year) - Math.PI/2;
      const r = radius(d.age);
      return Math.sin(a) * r;
    })
    .attr("r", 4)
    .attr("fill", "#333")
    .attr("filter", d => d.estimate === "year range" ? "url(#blur)" : null)

    // ---- Tooltip interactions ----
    .on("mouseover", (event, d) => {
      tooltip.style("opacity", 1)
        .html(`
          <strong>${d.title}</strong><br/>
          ${d.dateLabel}<br/>
          ${d.place}, ${d.country}<br/>
          ${d.category}<br/>
          ${d.link ? `<a href="${d.link}" target="_blank">link</a>` : ""}
        `);
    })
    .on("mousemove", (event) => {
      tooltip
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY + 10) + "px");
    })
    .on("mouseout", () => {
      tooltip.style("opacity", 0);
    });

});

</script>
</body>
</html>
